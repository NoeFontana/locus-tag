site_name: Locus
site_description: High-performance fiducial marker detector.

site_url: https://noefontana.github.io/locus-tag/
repo_url: https://github.com/NoeFontana/locus-tag
repo_name: NoeFontana/locus-tag

theme:
  name: material
  features:
    - navigation.expand
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: teal
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - admonition
  # Re-added narrowly so `docs/explanation/performance.md` can include
  # the Performance Profiles + ICRA comparison tables from README.md
  # via named markers (`<!-- --8<-- [start:performance-tables] -->`).
  # Single source of truth for the benchmark numbers across the README
  # (GitHub / PyPI) and the docs site. Do NOT widen to inline the entire
  # README again — that was the original drift footgun.
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js
  - javascripts/mermaid-init.js

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_root_heading: true
            show_source: true
            show_category_heading: true
            separate_signature: true
            group_by_category: true
            show_signature_annotations: true

nav:
  - Home: index.md
  - Tutorials:
      - tutorials/guide.md
  - How-To Guides:
      - how-to/add_dictionary.md
      - how-to/debug_with_rerun.md
      - how-to/concurrent_detection.md
      - how-to/install-with-distortion.md
      - how-to/tune_and_compare.md
  - Explanation:
      - explanation/architecture.md
      - explanation/pipeline.md
      - explanation/memory_model.md
      - explanation/algorithms.md
      - explanation/coordinates.md
      - explanation/performance.md
  - Reference:
      - reference/api.md
  - Engineering (Internal):
      - engineering/core.md
      - engineering/workflow.md
      - engineering/release-runbook.md
      - engineering/detection-batch-contract.md
      - engineering/constraints.md
      - engineering/ffi_contracts.md
      - engineering/profiles.md
      - engineering/stratification.md
      - engineering/quality-gates.md
      - engineering/rust-style.md
      - engineering/python-style.md
      - engineering/general-style.md
      - Benchmarking:
          - engineering/benchmarking.md
          - engineering/benchmarking/lessons.md
          - engineering/benchmarking/micro-benchmarking-guide.md
          - engineering/benchmarking/release_performance_20260418.md
          - engineering/benchmarking/hub_regression_20260423.md
          - engineering/benchmarking/render_tag_sota_20260425.md
          - engineering/benchmarking/render_tag_2160p_20260425.md
          - engineering/benchmarking/quad_truncation_fix_20260426.md
  - Migration:
      - migration/config-refactor.md

extra:
  version:
    provider: mike
    default: stable
