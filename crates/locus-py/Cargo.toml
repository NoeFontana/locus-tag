[package]
name = "locus-py"
version = "0.3.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[lib]
name = "locus"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.28", features = ["extension-module", "abi3-py310"] }
numpy = "0.28"
locus-core = { path = "../locus-core" }
bumpalo = "3.20"
tracing = "0.1.44"
tracing-tracy = { version = "0.11", optional = true }
tracing-subscriber = { version = "0.3", features = ["registry", "env-filter"], optional = true }
nalgebra = "0.34"
ndarray = "0.17"

[features]
default = []
tracy = ["locus-core/tracy", "dep:tracing-tracy", "dep:tracing-subscriber"]
[lints]
workspace = true
