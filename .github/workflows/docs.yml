name: Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'README.md'
      - 'crates/locus-py/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/docs.yml'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: mkdocs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-toolchain
        with:
          python-version: '3.10'
          cache-key: docs

      - name: Install dependencies
        run: uv sync --group docs --group dev

      - name: Build extension
        run: uv run maturin develop --manifest-path crates/locus-py/Cargo.toml

      - name: Build MkDocs
        run: uv run mkdocs build --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'site'

  spell:
    name: codespell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          python-version: '3.10'
      - name: Install docs deps
        run: uv sync --group docs --no-install-project
      - name: Spell-check user-facing docs
        # engineering/ uses domain notation and is excluded from the site
        run: uv run --no-sync codespell docs/ --skip "docs/engineering"

  deploy:
    needs: [build, spell]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
