name: Tests (reusable)

on:
  workflow_call:
    inputs:
      python-matrix:
        description: 'JSON array of Python versions for the test-python job'
        type: string
        default: '["3.11"]'

env:
  # Single bump point for the non-matrix Python version used by every
  # ancillary job (lint, type-check, build-wheel, schema-parity, sdist).
  DEFAULT_PYTHON: '3.11'
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  UV_SYSTEM_PYTHON: 0
  TRACY_NO_INVARIANT_CHECK: "1"

jobs:
  validate-project:
    name: Validate Project & Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Toolchains
        uses: ./.github/actions/setup-toolchain
        with:
          python-version: ${{ env.DEFAULT_PYTHON }}
          enable-rust-cache: 'false'

      - name: Check uv.lock
        run: uv lock --check

      - name: Run dictionary validation
        run: |
          uv run --frozen --with jsonschema --with pydantic python tools/cli.py validate-dicts \
            --schema crates/locus-core/tests/schemas/dictionary.schema.json \
            crates/locus-core/data/dictionaries/*.json

      - name: Ruff Check & Format
        run: |
          uv sync --frozen --only-group lint
          uv run ruff check .
          uv run ruff format --check .

  type-check-python:
    name: Type Check Python (basedpyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Toolchains
        uses: ./.github/actions/setup-toolchain
        with:
          python-version: ${{ env.DEFAULT_PYTHON }}
          enable-rust-cache: 'false'

      - name: Install Python deps
        run: uv sync --frozen --group types --group bench --group etl --group docs

      - name: Run basedpyright
        run: uv run --frozen basedpyright

  rust-checks:
    name: Rust Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Toolchains
        uses: ./.github/actions/setup-toolchain
        with:
          enable-uv-cache: 'false'
          cache-key: rust-checks

      - name: Install Tools (Nextest, Insta)
        uses: taiki-e/install-action@v2
        with:
          tool: nextest,cargo-insta

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      # Supply-chain audit: license allowlist, advisories, multiple-versions
      # policy, sources allowlist. Inlined here to reuse the toolchain
      # cache rather than spinning up a dedicated runner.
      # `arguments: ''` overrides the action's default `--all-features`,
      # which would otherwise pull in optional `viz`/`bench-internals`
      # deps and contradict the `[graph]` scope in deny.toml.
      - name: cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          arguments: ''

      - name: Verify locus-core packages cleanly
        run: cargo package -p locus-core --locked --no-verify

      - name: Run Tests (Nextest)
        run: cargo nextest run --profile ci --all-features

      - name: Run Doc Tests
        run: cargo test --doc --all-features

      - name: Verify Snapshot Parity
        run: cargo insta test --release --all-features --features bench-internals --check

  # Independent of the host test build — split out so it runs in parallel
  # with `rust-checks` rather than extending its serial chain. Both legs
  # need a Rust toolchain but compile with different feature/target sets,
  # so cache sharing would be a wash.
  rust-extras:
    name: Rust Cross-compile & Rustdoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Toolchains
        uses: ./.github/actions/setup-toolchain
        with:
          enable-uv-cache: 'false'
          cache-key: rust-extras

      # `gcc-aarch64-linux-gnu` is large enough (~150 MB extracted) that
      # caching the .deb archives saves ~30-40s per run vs. re-fetching
      # from apt every time.
      - name: Cache apt packages (aarch64 toolchain)
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          version: 1.0

      - name: Check aarch64 compilation
        run: |
          rustup target add aarch64-unknown-linux-gnu
          cargo check --target aarch64-unknown-linux-gnu --all-features

      # Catches catastrophic doc failures (private/missing item refs,
      # syntax errors). The strict `RUSTDOCFLAGS=-D warnings` gate is the
      # long-term target — see the doc-rust justfile recipe to reproduce.
      - name: Build rustdoc (smoke)
        run: cargo doc --workspace --no-deps --all-features

  # Build the abi3 wheel ONCE. pyo3 is pinned to abi3-py310 in
  # crates/locus-py/Cargo.toml, so a single wheel installs into 3.10+
  # without rebuild. Downstream Python jobs consume this artifact instead
  # of running their own `maturin develop` per matrix leg.
  build-wheel:
    name: Build wheel (abi3)
    needs: validate-project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Toolchains
        uses: ./.github/actions/setup-toolchain
        with:
          python-version: ${{ env.DEFAULT_PYTHON }}
          cache-key: build-wheel

      - name: Build wheel
        run: |
          uv sync --frozen --group dev
          uv run maturin build --release --manifest-path crates/locus-py/Cargo.toml --out dist

      - uses: actions/upload-artifact@v7
        with:
          name: wheel-abi3
          path: dist/*.whl
          retention-days: 1

  test-python:
    name: Test Python (${{ matrix.python-version }})
    needs: [build-wheel, rust-checks]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Toolchains
        uses: ./.github/actions/setup-toolchain
        with:
          python-version: ${{ matrix.python-version }}
          enable-rust-cache: 'false'

      - name: Install Python test deps (no rust build)
        run: uv sync --frozen --group dev --group bench --no-install-project

      - name: Download wheel artifact
        uses: actions/download-artifact@v8
        with:
          name: wheel-abi3
          path: dist

      - name: Install built wheel
        run: uv pip install --python ${{ matrix.python-version }} dist/locus_tag-*.whl

      - name: Run tests
        run: uv run --no-sync pytest

  source-build-unrectified:
    name: Source Install (non_rectified)
    needs: [validate-project, rust-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Toolchains
        uses: ./.github/actions/setup-toolchain
        with:
          python-version: ${{ env.DEFAULT_PYTHON }}
          cache-key: source-build-unrectified

      - name: Build sdist
        run: |
          uv sync --frozen --group dev
          uv build --sdist --out-dir dist

      - name: Install sdist with non_rectified feature
        env:
          MATURIN_PEP517_ARGS: "--features locus-py/non_rectified"
        run: |
          SDIST=$(ls dist/locus_tag-*.tar.gz)
          test -n "$SDIST" || { echo "no sdist found in dist/" >&2; exit 1; }
          uv pip install --no-binary=:all: "$SDIST"

      - name: Smoke-test distortion API
        run: |
          uv run --no-sync python - <<'PY'
          import locus

          assert locus.HAS_NON_RECTIFIED, "HAS_NON_RECTIFIED must be True on the unrectified build"
          assert hasattr(locus.DistortionModel, "BrownConrady")
          assert hasattr(locus.DistortionModel, "KannalaBrandt")

          k = locus.CameraIntrinsics(
              fx=800.0, fy=800.0, cx=640.0, cy=360.0,
              distortion_model=locus.DistortionModel.BrownConrady,
              dist_coeffs=[-0.3, 0.1, 0.001, -0.002, 0.0],
          )
          assert k.distortion_model == locus.DistortionModel.BrownConrady
          assert len(k.dist_coeffs) == 5

          fisheye = locus.CameraIntrinsics(
              fx=380.0, fy=380.0, cx=320.0, cy=240.0,
              distortion_model=locus.DistortionModel.KannalaBrandt,
              dist_coeffs=[0.1, -0.01, 0.001, 0.0],
          )
          assert fisheye.distortion_model == locus.DistortionModel.KannalaBrandt
          assert len(fisheye.dist_coeffs) == 4
          print("unrectified source install OK")
          PY

  schema-parity:
    name: Profile Schema Parity
    needs: [validate-project, build-wheel]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Toolchains
        uses: ./.github/actions/setup-toolchain
        with:
          python-version: ${{ env.DEFAULT_PYTHON }}
          enable-rust-cache: 'false'

      - name: Install Python deps (no rust build)
        run: uv sync --frozen --group dev --no-install-project

      - name: Download wheel artifact
        uses: actions/download-artifact@v8
        with:
          name: wheel-abi3
          path: dist

      - name: Install built wheel
        run: uv pip install --python ${{ env.DEFAULT_PYTHON }} dist/locus_tag-*.whl

      - name: Check schema is up to date
        run: uv run --no-sync python tools/export_profile_schema.py --check

  wheel-smoke:
    name: Wheel Install Smoke Test
    needs: build-wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download wheel artifact
        uses: actions/download-artifact@v8
        with:
          name: wheel-abi3
          path: dist

      - name: Smoke test each shipped profile
        run: bash scripts/ci/install_and_smoke_wheel.sh

  robustness-testing:
    name: Robustness Testing (Proptest)
    needs: rust-checks
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup Toolchains
        uses: ./.github/actions/setup-toolchain
        with:
          enable-uv-cache: 'false'
          cache-key: robustness

      - name: Run Robustness Suite
        run: |
          cargo test --test robustness_pipeline --all-features
          cargo test --test robustness_threshold --all-features
          cargo test --test robustness_geometry --all-features
          cargo test --test robustness_decoder --all-features
          cargo test --test robustness_concurrency --all-features
          cargo test --test robustness_memory --all-features
          cargo test --test robustness_api --all-features
