name: Tests (reusable)

on:
  workflow_call:
    inputs:
      python-matrix:
        description: 'JSON array of Python versions for the test-python job'
        type: string
        default: '["3.11"]'

env:
  CARGO_TERM_COLOR: always
  UV_SYSTEM_PYTHON: 0
  TRACY_NO_INVARIANT_CHECK: "1"

jobs:
  validate-project:
    name: Validate Project & Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Toolchains
        uses: ./.github/actions/setup-toolchain
        with:
          python-version: '3.11'
          enable-rust-cache: 'false'

      - name: Check uv.lock
        run: uv lock --check

      - name: Run dictionary validation
        run: |
          uv run --frozen --with jsonschema --with pydantic python tools/cli.py validate-dicts \
            --schema crates/locus-core/tests/schemas/dictionary.schema.json \
            crates/locus-core/data/dictionaries/*.json

      - name: Ruff Check & Format
        shell: bash
        run: |
          set -o pipefail
          uv sync --frozen --only-group lint
          uv run ruff check . 2>&1 | tee ruff-check.log
          uv run ruff format --check . 2>&1 | tee ruff-format.log

      - name: Upload Logs on Failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: failure-logs-validate
          path: "*.log"
          retention-days: 1

  rust-checks:
    name: Rust Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Toolchains
        uses: ./.github/actions/setup-toolchain
        with:
          rust-components: rustfmt, clippy
          enable-uv-cache: 'false'

      - name: Install Tools (Nextest, Insta)
        uses: taiki-e/install-action@v2
        with:
          tool: nextest,cargo-insta

      - name: Check Formatting
        shell: bash
        run: |
          set -o pipefail
          cargo fmt --all -- --check 2>&1 | tee rust-fmt.log

      - name: Clippy
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --all-targets --all-features -- -D warnings 2>&1 | tee rust-clippy.log

      - name: Check lean feature-set compiles
        shell: bash
        run: |
          set -o pipefail
          cargo check --workspace 2>&1 | tee rust-check-lean.log

      - name: Verify locus-core packages cleanly
        shell: bash
        run: |
          set -o pipefail
          cargo package -p locus-core --locked --no-verify 2>&1 | tee rust-package.log

      - name: Check aarch64 compilation
        shell: bash
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          rustup target add aarch64-unknown-linux-gnu
          cargo check --target aarch64-unknown-linux-gnu --all-features

      - name: Run Tests (Nextest)
        shell: bash
        run: |
          set -o pipefail
          cargo nextest run --profile ci --all-features 2>&1 | tee test-rust.log

      - name: Run Doc Tests
        shell: bash
        run: |
          set -o pipefail
          cargo test --doc --all-features 2>&1 | tee test-rust-doc.log

      - name: Verify Snapshot Parity
        shell: bash
        run: |
          set -o pipefail
          TRACY_NO_INVARIANT_CHECK=1 cargo insta test --release --all-features --features bench-internals --check 2>&1 | tee test-rust-insta.log

      - name: Upload Logs on Failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: failure-logs-rust-checks
          path: "*.log"
          retention-days: 1

  test-python:
    name: Test Python (${{ matrix.python-version }})
    needs: [validate-project, rust-checks]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Toolchains
        uses: ./.github/actions/setup-toolchain
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup dynamic environment
        run: uv sync --frozen --group dev --group bench

      - name: Build bridge (maturin develop)
        run: uv run maturin develop --release --manifest-path crates/locus-py/Cargo.toml

      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          uv run pytest 2>&1 | tee test-python-${{ matrix.python-version }}.log

      - name: Upload Logs on Failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: failure-logs-test-python-${{ matrix.python-version }}
          path: "*.log"
          retention-days: 1

  source-build-unrectified:
    name: Source Install (non_rectified)
    needs: [validate-project, rust-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Toolchains
        uses: ./.github/actions/setup-toolchain
        with:
          python-version: '3.11'

      - name: Build sdist
        shell: bash
        run: |
          set -o pipefail
          uv sync --frozen --group dev
          uv build --sdist --out-dir dist 2>&1 | tee build-sdist.log

      - name: Install sdist with non_rectified feature
        shell: bash
        env:
          MATURIN_PEP517_ARGS: "--features locus-py/non_rectified"
        run: |
          set -o pipefail
          SDIST=$(ls dist/locus_tag-*.tar.gz)
          test -n "$SDIST" || { echo "no sdist found in dist/" >&2; exit 1; }
          uv pip install --no-binary=:all: "$SDIST" 2>&1 | tee install-unrectified.log

      - name: Smoke-test distortion API
        shell: bash
        run: |
          set -o pipefail
          uv run --no-sync python - <<'PY' 2>&1 | tee smoke-unrectified.log
          import locus

          assert locus.HAS_NON_RECTIFIED, "HAS_NON_RECTIFIED must be True on the unrectified build"
          assert hasattr(locus.DistortionModel, "BrownConrady")
          assert hasattr(locus.DistortionModel, "KannalaBrandt")

          k = locus.CameraIntrinsics(
              fx=800.0, fy=800.0, cx=640.0, cy=360.0,
              distortion_model=locus.DistortionModel.BrownConrady,
              dist_coeffs=[-0.3, 0.1, 0.001, -0.002, 0.0],
          )
          assert k.distortion_model == locus.DistortionModel.BrownConrady
          assert len(k.dist_coeffs) == 5

          fisheye = locus.CameraIntrinsics(
              fx=380.0, fy=380.0, cx=320.0, cy=240.0,
              distortion_model=locus.DistortionModel.KannalaBrandt,
              dist_coeffs=[0.1, -0.01, 0.001, 0.0],
          )
          assert fisheye.distortion_model == locus.DistortionModel.KannalaBrandt
          assert len(fisheye.dist_coeffs) == 4
          print("unrectified source install OK")
          PY

      - name: Upload Logs on Failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: failure-logs-source-build-unrectified
          path: "*.log"
          retention-days: 1

  schema-parity:
    name: Profile Schema Parity
    needs: validate-project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Toolchains
        uses: ./.github/actions/setup-toolchain
        with:
          python-version: '3.11'
          enable-rust-cache: 'false'

      - name: Install Python deps and build bridge
        run: |
          uv sync --frozen --group dev
          uv run maturin develop --release --manifest-path crates/locus-py/Cargo.toml

      - name: Check schema is up to date
        shell: bash
        run: |
          set -o pipefail
          uv run python tools/export_profile_schema.py --check 2>&1 | tee schema-parity.log

      - name: Upload Logs on Failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: failure-logs-schema-parity
          path: "*.log"
          retention-days: 1

  wheel-smoke:
    name: Wheel Install Smoke Test
    needs: [validate-project, rust-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Toolchains
        uses: ./.github/actions/setup-toolchain
        with:
          python-version: '3.11'

      - name: Build wheel
        shell: bash
        run: |
          set -o pipefail
          uv sync --frozen --group dev
          uv run maturin build --release --manifest-path crates/locus-py/Cargo.toml --out dist 2>&1 | tee build-wheel.log

      - name: Smoke test each shipped profile
        shell: bash
        run: |
          set -o pipefail
          bash scripts/ci/install_and_smoke_wheel.sh 2>&1 | tee smoke-wheel.log

      - name: Upload Logs on Failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: failure-logs-wheel-smoke
          path: "*.log"
          retention-days: 1

  robustness-testing:
    name: Robustness Testing (Proptest)
    needs: rust-checks
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup Toolchains
        uses: ./.github/actions/setup-toolchain
        with:
          enable-uv-cache: 'false'

      - name: Run Robustness Suite
        shell: bash
        run: |
          set -o pipefail
          cargo test --test robustness_pipeline --all-features
          cargo test --test robustness_threshold --all-features
          cargo test --test robustness_geometry --all-features
          cargo test --test robustness_decoder --all-features
          cargo test --test robustness_concurrency --all-features
          cargo test --test robustness_memory --all-features
          cargo test --test robustness_api --all-features

      - name: Upload Logs on Failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: failure-logs-robustness
          path: "*.log"
          retention-days: 1
