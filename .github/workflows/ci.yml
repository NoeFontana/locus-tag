name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  UV_SYSTEM_PYTHON: 0 # Ensure uv uses its own managed Python
  TRACY_NO_INVARIANT_CHECK: "1" # Avoid Tracy initialization failure in CI

jobs:
  validate-project:
    name: Validate Project (Data & Lock)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.11'
          
      - name: Check uv.lock
        run: uv lock --check
        
      - name: Run dictionary validation
        run: |
          uv run --frozen --with jsonschema --with pydantic python tools/cli.py validate-dicts \
            --schema crates/locus-core/tests/schemas/dictionary.schema.json \
            data/dictionaries/*.json

  lint-rust:
    name: Lint Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0" # Matches project target or latest stable
          components: rustfmt, clippy
          
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      
      - name: Check Formatting
        shell: bash
        run: |
          set -o pipefail
          cargo fmt --all -- --check 2>&1 | tee rust-fmt.log
      
      - name: Clippy
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --all-targets --all-features -- -D warnings 2>&1 | tee rust-clippy.log

      - name: Upload Logs on Failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-lint-rust
          path: "*.log"
          retention-days: 1

  test-rust:
    name: Test Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        
      - name: Install Tools (Nextest, Insta)
        uses: taiki-e/install-action@v2
        with:
          tool: nextest,cargo-insta

      - name: Run Tests
        shell: bash
        run: |
          set -o pipefail
          # Heavy regression tests are excluded by default via .config/nextest.toml
          cargo nextest run --profile ci --all-features 2>&1 | tee test-rust.log

      - name: Run Doc Tests
        shell: bash
        run: |
          set -o pipefail
          cargo test --doc --all-features 2>&1 | tee test-rust-doc.log

      - name: Verify Snapshot Parity
        shell: bash
        run: |
          set -o pipefail
          # Verify ALL snapshots in release mode.
          # Regression tests that require external data will be skipped automatically if data is missing,
          # while regression_fixtures (which uses committed data) will be verified.
          cargo insta test --release --all-features --features bench-internals --check 2>&1 | tee test-rust-insta.log

      - name: Upload Logs on Failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-test-rust
          path: "*.log"
          retention-days: 1

  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      
      - name: Set up environment
        run: uv sync --frozen --only-group lint
        
      - name: Ruff Check
        shell: bash
        run: |
          set -o pipefail
          uv run ruff check . 2>&1 | tee ruff-check.log
      
      - name: Ruff Format
        shell: bash
        run: |
          set -o pipefail
          uv run ruff format --check . 2>&1 | tee ruff-format.log

      - name: Upload Logs on Failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-lint-python
          path: "*.log"
          retention-days: 1

  test-python:
    name: Test Python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ github.event_name == 'pull_request' && fromJSON('["3.11"]') || fromJSON('["3.10", "3.11", "3.12"]') }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Rust + Python Cache
        uses: Swatinem/rust-cache@v2

      - name: Setup dynamic environment
        run: uv sync --frozen --group dev --group bench

      - name: Build bridge (maturin develop)
        run: uv run maturin develop --release --manifest-path crates/locus-py/Cargo.toml

      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          uv run pytest 2>&1 | tee test-python-${{ matrix.python-version }}.log

      - name: Upload Logs on Failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-test-python-${{ matrix.python-version }}
          path: "*.log"
          retention-days: 1

  robustness-testing:
    name: Robustness Testing (Proptest)
    runs-on: ubuntu-latest
    continue-on-error: true # Non-blocking during initial rollout phase
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        
      - name: Install Tools (Nextest)
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Run Robustness Suite
        shell: bash
        run: |
          set -o pipefail
          # Execute the robustness targets explicitly.
          # Subdirectory integration tests can be tricky for automated discovery in some environments.
          cargo test --test robustness_pipeline --all-features
          cargo test --test robustness_threshold --all-features
          cargo test --test robustness_geometry --all-features
          cargo test --test robustness_decoder --all-features
          cargo test --test robustness_concurrency --all-features
          cargo test --test robustness_memory --all-features
          cargo test --test robustness_api --all-features

      - name: Upload Logs on Failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-robustness
          path: "*.log"
          retention-days: 1
