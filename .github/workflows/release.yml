name: Release

# Fan-out for every `v*` tag push and a monthly Linux-only canary.
#
# On a tag push:
#   verify-tag                                       (refuses mismatched tags)
#     ├─► build-rust                                 (cargo package -p locus-core)
#     ├─► build-wheels-linux  (manylinux + musllinux × x86_64/aarch64)
#     ├─► build-wheels-macos  (x86_64/aarch64)       [skipped on schedule]
#     ├─► build-wheels-windows (x64)                 [skipped on schedule]
#     └─► build-sdist
#                                          │
#                                          ▼
#                                    wheel-validate  (smoke on x86_64 + aarch64 QEMU)
#                                          │
#         ┌────────────────────────────────┼────────────────────────────────┐
#         ▼                                ▼                                ▼
#   publish-pypi (OIDC + PEP 740)   publish-crates-io (OIDC)        create-github-release
#                                                                  (notes + artefacts)
#
# `verify-tag` gates publishing: tags ending in `-rc.*` set
# outputs.publish=false, which skips both publish jobs and marks the GH
# Release as `--prerelease`. The monthly cron exercises the wheel build
# on Linux only to catch toolchain drift between releases; macOS (10×
# billing) and Windows (2× billing) are reserved for actual release
# builds.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  schedule:
    # 1st-of-month, 06:00 UTC. Linux-only canary; macOS/Windows/publish
    # jobs gate themselves off `github.event_name == 'schedule'`.
    - cron: '0 6 1 * *'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Tag-gated guard: refuse to release a `vX.Y.Z` tag that doesn't match
  # the on-disk versions in both `crates/locus-core/Cargo.toml` and
  # `pyproject.toml`. Catches a forgotten bump before either registry has
  # a chance to accept the upload — neither PyPI nor crates.io permits
  # re-uploading the same version, so a mismatch caught post-publish
  # costs a patch bump.
  verify-tag:
    name: Verify tag matches on-disk versions
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.gate.outputs.publish }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Assert tag == locus-core Cargo.toml == pyproject.toml
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/v}"
          # Strip -rc.N suffix so RC dry-run tags (v0.5.0-rc.1) compare equal
          # to the manifest version (0.5.0). The publish gate below uses the
          # full ref to decide whether to actually publish.
          tag="${tag%-rc.*}"
          core_version="$(cargo metadata --format-version 1 --no-deps \
            | python3 -c "import json,sys; m=json.load(sys.stdin); print(next(p['version'] for p in m['packages'] if p['name']=='locus-core'))")"
          py_version="$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          echo "tag=${tag}  locus-core=${core_version}  pyproject=${py_version}"
          if [[ "$tag" != "$core_version" || "$tag" != "$py_version" ]]; then
            echo "::error::tag v${tag} does not match locus-core=${core_version} / pyproject=${py_version}" >&2
            exit 1
          fi
      # Single source of truth for "should this tag publish?". Both
      # publish-pypi and publish-crates-io read `needs.verify-tag.outputs.publish`.
      - name: Compute publish gate (skip RC tags)
        id: gate
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* && "${GITHUB_REF}" != *-rc.* ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

  build-rust:
    name: Build & Verify Crate
    if: github.event_name != 'schedule'
    needs: verify-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-build-rust
      - name: Package locus-core
        run: cargo package -p locus-core --locked
      - name: Upload Crate Artifact
        uses: actions/upload-artifact@v7
        with:
          name: rust-crate
          path: target/package/*.crate
          retention-days: 1

  build-wheels-linux:
    name: Wheels linux ${{ matrix.target }} ${{ matrix.manylinux }}
    needs: verify-tag
    # On schedule runs verify-tag is skipped → `needs` evaluates to
    # `skipped`, which would skip this job by default. Force the build
    # to run anyway by checking event_name directly.
    if: always() && (needs.verify-tag.result == 'success' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
        manylinux: [auto, musllinux_1_2]
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        if: matrix.target == 'aarch64'
        uses: docker/setup-qemu-action@v4

      # pyo3 is pinned to abi3-py310 in crates/locus-py/Cargo.toml, so a
      # single wheel per (target, manylinux) covers Python 3.10+ — no
      # per-Py matrix.
      - name: Build Wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}-unknown-linux-gnu
          args: --out dist --release --manifest-path crates/locus-py/Cargo.toml
          manylinux: ${{ matrix.manylinux }}

      - name: Upload Wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.target }}-${{ matrix.manylinux }}
          path: dist/*.whl
          retention-days: 1

  build-wheels-macos:
    name: Wheels macos ${{ matrix.target }}
    # Skip on schedule: macOS runners bill 10× and are reserved for tag
    # / manual release-candidate builds.
    if: github.event_name != 'schedule'
    needs: verify-tag
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Build Wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}-apple-darwin
          args: --out dist --release --manifest-path crates/locus-py/Cargo.toml
      - name: Upload Wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist/*.whl
          retention-days: 1

  build-wheels-windows:
    name: Wheels windows ${{ matrix.target }}
    # Skip on schedule: Windows runners bill 2× and are reserved for tag
    # / manual release-candidate builds.
    if: github.event_name != 'schedule'
    needs: verify-tag
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          architecture: ${{ matrix.target }}
      - name: Build Wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: x86_64-pc-windows-msvc
          args: --out dist --release --manifest-path crates/locus-py/Cargo.toml
      - name: Upload Wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist/*.whl
          retention-days: 1

  build-sdist:
    name: Build Source Distribution
    if: github.event_name != 'schedule'
    needs: verify-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-toolchain
        with:
          python-version: '3.10'
          cache-key: release-build-sdist
      - run: uv sync --group dev

      - name: Build Sdist
        run: uv build --sdist --out-dir dist

      - name: Upload Sdist
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 1

  # aarch64 QEMU smoke covers the SIMD/FFI integration cleanly. Adding
  # macOS/Windows smoke runners would 3× the validate cost without
  # catching meaningfully different failure modes (Rust + PyO3 +
  # maturin catch ABI issues at build time). Revisit if a
  # macOS-specific bug ever ships.
  wheel-validate:
    name: Smoke-test built wheel (linux ${{ matrix.target }})
    if: github.event_name != 'schedule'
    needs: build-wheels-linux
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v6

      - name: Download wheel artifact
        uses: actions/download-artifact@v8
        with:
          name: wheels-linux-${{ matrix.target }}-auto
          path: dist

      - name: Set up QEMU
        if: matrix.target == 'aarch64'
        uses: docker/setup-qemu-action@v4

      - name: Smoke test (x86_64, native)
        if: matrix.target == 'x86_64'
        run: bash scripts/ci/install_and_smoke_wheel.sh

      - name: Smoke test (aarch64, QEMU)
        if: matrix.target == 'aarch64'
        run: |
          docker run --rm --platform linux/arm64 \
            -v "$PWD:/work" -w /work \
            python:3.11-slim \
            bash scripts/ci/install_and_smoke_wheel.sh

  # PyPI publish via Trusted Publisher (OIDC — no API token stored in
  # GitHub secrets). Switched from `uv publish` to
  # `pypa/gh-action-pypi-publish` to get PEP 740 sigstore attestations
  # (`attestations: true`). PyPI verifies and exposes the attestation
  # on the project page; supply-chain-conscious consumers
  # (`pip --require-hashes`, `pip-audit`, security-scanning tools)
  # gate installs on it.
  publish-pypi:
    name: Publish to PyPI
    needs: [verify-tag, build-wheels-linux, build-wheels-macos, build-wheels-windows, build-sdist, wheel-validate]
    runs-on: ubuntu-latest
    environment: release
    if: |
      github.event_name != 'schedule'
      && needs.verify-tag.outputs.publish == 'true'
    permissions:
      id-token: write   # OIDC for PyPI Trusted Publisher
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: 'wheels-*'
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v8
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI (Trusted Publisher + PEP 740 attestations)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

  # crates.io publish via Trusted Publisher (OIDC — no
  # CARGO_REGISTRY_TOKEN secret). Requires Trusted Publishers set up at
  # https://crates.io/me/trusted-publishers for `locus-core` pointing
  # at this workflow with `Environment` left blank.
  publish-crates-io:
    name: Publish to crates.io
    needs: [verify-tag, build-rust, wheel-validate]
    runs-on: ubuntu-latest
    environment: release
    if: |
      github.event_name != 'schedule'
      && needs.verify-tag.outputs.publish == 'true'
    permissions:
      id-token: write   # OIDC for rust-lang/crates-io-auth-action
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Mint short-lived crates.io token
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: cargo publish locus-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p locus-core

  # Posts a GH Release page with the CHANGELOG.md `## [X.Y.Z]` block as
  # the body and the full artefact set (wheels, sdist, .crate) attached.
  # Runs on every `v*` tag (including RC tags), marks RC tags as
  # `--prerelease`. The `always()` guard plus per-need result checks
  # let this fire even when publish-pypi / publish-crates-io are skipped
  # (RC dry-run path), while still requiring the build + validate jobs
  # to have succeeded.
  create-github-release:
    name: Create GitHub Release
    needs: [verify-tag, build-rust, build-wheels-linux, build-wheels-macos, build-wheels-windows, build-sdist, wheel-validate, publish-pypi, publish-crates-io]
    if: |
      always()
      && github.event_name != 'schedule'
      && needs.verify-tag.result == 'success'
      && needs.build-rust.result == 'success'
      && needs.build-wheels-linux.result == 'success'
      && needs.build-wheels-macos.result == 'success'
      && needs.build-wheels-windows.result == 'success'
      && needs.build-sdist.result == 'success'
      && needs.wheel-validate.result == 'success'
      && (needs.publish-pypi.result == 'success' || needs.publish-pypi.result == 'skipped')
      && (needs.publish-crates-io.result == 'success' || needs.publish-crates-io.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # gh release create writes to the repo
    steps:
      - uses: actions/checkout@v6

      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: 'wheels-*'
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v8
        with:
          name: sdist
          path: dist

      - name: Download .crate
        uses: actions/download-artifact@v8
        with:
          name: rust-crate
          path: dist

      - name: Extract release notes
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/v}"
          python3 scripts/ci/extract_changelog_section.py "$tag" CHANGELOG.md > release-notes.md
          echo "::group::Release notes"
          cat release-notes.md
          echo "::endgroup::"

      - name: Compute prerelease flag
        id: prerelease
        run: |
          if [[ "${{ needs.verify-tag.outputs.publish }}" == "true" ]]; then
            echo "flag=" >> "$GITHUB_OUTPUT"
          else
            echo "flag=--prerelease" >> "$GITHUB_OUTPUT"
          fi

      - name: gh release create
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title "$tag" \
            --notes-file release-notes.md \
            ${{ steps.prerelease.outputs.flag }} \
            dist/*.whl dist/*.tar.gz dist/*.crate
