name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  build-rust:
    name: Build & Verify Crate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Package locus-core
        run: cargo package -p locus-core --allow-dirty
      - name: Upload Crate Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-crate
          path: target/package/*.crate
          retention-days: 1

  build-wheels:
    name: Build Wheels (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up QEMU
        if: matrix.target == 'aarch64'
        uses: docker/setup-qemu-action@v3
      
      - name: Build Wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}-unknown-linux-gnu
          args: --out dist --release
          manylinux: 2_28
          
      - name: Upload Wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl
          retention-days: 1

  build-sdist:
    name: Build Source Distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.10'
      - run: uv sync --group dev
      
      - name: Build Sdist
        run: uv build --sdist --out-dir dist
      
      - name: Upload Sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 1

  publish:
    name: Unified Publish
    needs: [build-rust, build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: release
    # Only run publish job for production tags (vX.Y.Z), skip for RCs (vX.Y.Z-rc.N)
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-rc.')
    steps:
      - uses: actions/checkout@v4
      
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: '*'
          merge-multiple: true

      - name: Setup Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.10'

      - name: Publish Python Distributions to PyPI
        run: uv publish dist/* --trusted-publishing automatic

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish locus-core to Crates.io
        run: cargo publish -p locus-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
