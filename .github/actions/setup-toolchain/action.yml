name: 'Setup CI Toolchains'
description: 'Installs Rust, Python (via uv), and configures caching'

inputs:
  python-version:
    description: 'The Python version to install'
    required: false
    default: '3.11'
  rust-toolchain:
    description: 'The Rust toolchain to install'
    required: false
    default: '1.92.0'
  rust-components:
    description: 'Comma-separated list of Rust components to install'
    required: false
    default: ''
  enable-rust-cache:
    description: 'Whether to enable the Rust cache'
    required: false
    default: 'true'

runs:
  using: "composite"
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        python-version: ${{ inputs.python-version }}
        
    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.rust-toolchain }}
        components: ${{ inputs.rust-components }}
        
    - name: Rust Cache
      if: inputs.enable-rust-cache == 'true'
      uses: Swatinem/rust-cache@v2
